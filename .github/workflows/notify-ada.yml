name: Notify Ada
on:
  push:
    branches: [main, master]

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Message Ada on Telegram
        env:
          BOT_TOKEN: ${{ secrets.ADA_TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.ADA_CHAT_ID }}
          REPO: ${{ github.repository }}
          BRANCH: ${{ github.ref_name }}
          ACTOR: ${{ github.actor }}
          COMMIT: ${{ github.event.head_commit.message }}
        run: |
          TEXT="🚀 New Deploy: ${REPO} (${BRANCH}) by ${ACTOR} — ${COMMIT}"
          curl -s -X POST "https://api.telegram.org/bot${BOT_TOKEN}/sendMessage" \
            -d "chat_id=${CHAT_ID}" \
            -d "text=${TEXT}"
