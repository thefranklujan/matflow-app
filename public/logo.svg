<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 180" width="600" height="180">
  <!-- Black background -->
  <rect x="0" y="0" width="600" height="180" fill="#000000"/>

  <!-- Red square mark with 3 white dashes (middle slightly shorter) -->
  <rect x="20" y="20" width="140" height="140" rx="20" fill="#dc2626"/>
  <rect x="50" y="55" width="80" height="14" rx="3" fill="#ffffff"/>
  <rect x="50" y="83" width="56" height="14" rx="3" fill="#ffffff"/>
  <rect x="50" y="111" width="80" height="14" rx="3" fill="#ffffff"/>

  <!-- Wordmark -->
  <text x="190" y="115"
        font-family="'Helvetica Neue', Arial, sans-serif"
        font-size="100"
        font-weight="900"
        fill="#ffffff"
        letter-spacing="-4">MatFlow</text>

  <!-- Belt color bar underneath wordmark -->
  <g>
    <rect x="190" y="135" width="76" height="12" fill="#ffffff" stroke="#000" stroke-width="0.5"/>
    <rect x="266" y="135" width="76" height="12" fill="#2563eb"/>
    <rect x="342" y="135" width="76" height="12" fill="#7c3aed"/>
    <rect x="418" y="135" width="76" height="12" fill="#92400e"/>
    <rect x="494" y="135" width="76" height="12" fill="#000000" stroke="#ffffff" stroke-width="0.5"/>
  </g>
</svg>
