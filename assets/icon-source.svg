<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <!-- Black background -->
  <rect x="0" y="0" width="1024" height="1024" fill="#000000"/>

  <!-- MatFlow wordmark, centered -->
  <text x="512" y="540"
        text-anchor="middle"
        font-family="'Helvetica Neue', Arial, sans-serif"
        font-size="180"
        font-weight="900"
        fill="#ffffff"
        letter-spacing="-8">MatFlow</text>

  <!-- Belt color bar underneath wordmark (white, blue, purple, brown, black) -->
  <g>
    <rect x="192"  y="600" width="128" height="32" fill="#ffffff" stroke="#333333" stroke-width="2"/>
    <rect x="320"  y="600" width="128" height="32" fill="#2563eb"/>
    <rect x="448"  y="600" width="128" height="32" fill="#7c3aed"/>
    <rect x="576"  y="600" width="128" height="32" fill="#92400e"/>
    <rect x="704"  y="600" width="128" height="32" fill="#000000" stroke="#ffffff" stroke-width="2"/>
  </g>
</svg>
